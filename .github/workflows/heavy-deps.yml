name: Heavy Deps (manual)

on:
  workflow_dispatch:

jobs:
  heavy-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Create virtualenv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip setuptools wheel

      - name: Install heavy deps
        run: |
          . .venv/bin/activate
          pip install -r requirements-heavy-locked.txt

      - name: Smoke-test heavy import
        run: |
          . .venv/bin/activate
          python -c "import importlib, sys; pkgs=['torch','cv2']; missing=[p for p in pkgs if importlib.util.find_spec(p) is None]; print('MISSING:', missing); sys.exit(bool(missing))"
